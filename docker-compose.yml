version: '3.8'

services:
  backend:
    build: ./backend
    container_name: dongdong-tarot-api
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend/dongdong_tarot.db:/app/dongdong_tarot.db
      - ./backend/vector_store:/app/vector_store
      - ./书籍文献:/app/书籍文献
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - BOOKS_DIR=/app/书籍文献
      - VECTOR_STORE_DIR=/app/vector_store
    networks:
      - tarot-net

  frontend:
    image: nginx:alpine
    container_name: dongdong-tarot-web
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/app/frontend/dist:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - tarot-net

networks:
  tarot-net:
    driver: bridge
