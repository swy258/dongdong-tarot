services:
  - type: web
    name: dongdong-tarot-api
    env: python
    buildCommand: pip install -r requirements-light.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./dongdong_tarot.db
      - key: BOOKS_DIR
        value: ./books
      - key: VECTOR_STORE_DIR
        value: ./vector_store
      - key: PYTHON_VERSION
        value: 3.12.0
    plan: free
